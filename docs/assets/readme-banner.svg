  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1320" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#0f2a4a"/>
      <stop offset="1" stop-color="#0f766e"/>
