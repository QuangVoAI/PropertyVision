      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.03 0 1 0 0 0.19 0 0 1 0 0.31 0 0 0 0.32 0"/>
      <feBlend mode="screen" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1400" height="360" rx="32" fill="url(#bg)"/>
  <circle cx="210" cy="92" r="68" fill="#22c55e" opacity="0.12" filter="url(#glow)"/>
